deployment:
  tasks:
    - export DOCROOT=/home/gopsapp1/battlevue.gops.app
    - export APIDIR=/home/gopsapp1/battlevue.gops.app/api
    - mkdir -p "$DOCROOT"
    - mkdir -p "$APIDIR"
    - |
      if command -v rsync >/dev/null 2>&1; then
        rsync -a --delete --exclude='.htaccess' --exclude='api/' dist/ "$DOCROOT/"
      else
        find "$DOCROOT" -mindepth 1 -maxdepth 1 ! -name '.htaccess' ! -name 'api' -exec rm -rf {} +
        cp -R dist/. "$DOCROOT/"
      fi
    - cp .htaccess "$DOCROOT/.htaccess"
    - |
      if command -v rsync >/dev/null 2>&1; then
        rsync -a --delete --exclude='config.php' api/ "$APIDIR/"
      else
        find "$APIDIR" -mindepth 1 -maxdepth 1 ! -name 'config.php' -exec rm -rf {} +
        cp -R api/. "$APIDIR/"
      fi
    - |
      if [ -f "$APIDIR/config/config.php" ]; then
        php "$APIDIR/scripts/migrate.php" >/tmp/battlevue_migrate.log 2>&1 &
        MIGRATE_PID=$!
        MAX_WAIT=60
        ELAPSED=0
        while kill -0 "$MIGRATE_PID" >/dev/null 2>&1; do
          if [ "$ELAPSED" -ge "$MAX_WAIT" ]; then
            kill -TERM "$MIGRATE_PID" >/dev/null 2>&1 || true
            sleep 1
            kill -KILL "$MIGRATE_PID" >/dev/null 2>&1 || true
            echo "Migration timed out after ${MAX_WAIT}s; continuing deploy."
            break
          fi
          sleep 1
          ELAPSED=$((ELAPSED + 1))
        done
        wait "$MIGRATE_PID" >/dev/null 2>&1 || true
      fi
